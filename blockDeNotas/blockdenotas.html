<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="./css/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="./blockDeNotas.css">
	<link rel="stylesheet" href="./css/fontawesome/css/all.css">
	<title>Block de notas</title>
</head>
<body>
	<div class="container">
		<div class="row header">
			<div class="col-lg-6 text-center"><h1>Block de Notas</h1></div>
			<div class="col-lg-2"></div>
			<div class="col-lg-4 text-center">
				<input type="text" class="input" maxlength="17">
				<li class="fa-solid fa-search"></li>
			</div>
		</div>
		<div id="main">
			<p class="lastnote" contenteditable="">Nueva nota</p>
			<hr>
			<div class="row">
				<div class="col-lg-11"></div>
				<div class="col-lg-1"><div class="add">+</div></div>
			</div>
		</div>
	</div>
	<script type="text/javascript" src="./blockDeNotas.js"></script>
</body>
</html>
